<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments :: adminHead(' admin quote details')}"></head>

<body>
<div th:replace="~{fragments :: adminHeader ('admin header')}"></div>

<div class="quote-details-overview">
    <div class="quote-header">
        <a th:href="@{/adminProfilePage}">
            <svg class="admin-return-button" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
                 fill="none">
                <path class="admin-return-svg" d="M17.3333 10.6667L8 18.6667L17.3333 28" stroke="black"
                      stroke-width="9.25"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <path class="admin-return-svg"
                      d="M8 18.6667H38.6587C47.836 18.6667 55.6293 26.16 55.9867 35.3333C56.3653 45.0267 48.356 53.3333 38.6587 53.3333H15.9973"
                      stroke="black" stroke-width="9.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <h1 class="quote-details-title"> Admin Tilbuds oversigt</h1>
    </div>

    <div class="quote-details-box">
        <h2>Tilbud</h2>
        <p th:text="${'ID: ' + quote_admin_preview.quoteId}"></p>
        <p th:text="${quote_admin_preview.isPayed ? 'Betalt' : 'Ikke betalt'}"></p>
        <p th:text="${'Retailpris: ' + quote_admin_preview.retailPrice}"></p>
        <p th:text="${'Indkøbspris: ' + quote_admin_preview.costPrice}"></p>
        <p th:text="${'Bemærkning: ' + quote_admin_preview.remark}"></p>
        <br>
        <h2>Kunde</h2>
        <p th:text="${'Navn: ' + customer_quote_preview.firstName + ' ' + customer_quote_preview.lastName}"></p>
        <p th:text="${'Email: ' + customer_quote_preview.email}"></p>
        <p th:text="${'Telefon: ' + customer_quote_preview.phoneNumber}"></p>
        <br>
        <p th:text="${'Carport Bredde: ' + carport_quote_preview.width + ' cm'}"></p>
        <p th:text="${'Carport Længde: ' + carport_quote_preview.length + ' cm'}"></p>
        <p th:text="${'Tagtype: ' + carport_quote_preview.roofResponseDTO.roofType}"></p>
        <p th:text="${'Tagmateriale: ' + carport_quote_preview.roofResponseDTO.roofMaterial}"></p>
        <p th:text="${'Tag-hældning: ' + carport_quote_preview.roofResponseDTO.roofSlope}"></p>
        <div th:if="${shed != null}">
            <p th:text="${'Belædning: ' + shed.siding}"></p>
            <p th:text="${'Gulv: ' + shed.floor}"></p>
            <p th:text="${'Skur Bredde: ' + shed.width}"></p>
            <p th:text="${'Skur Længde: ' + shed.length}"></p>
        </div>
        <div th:if="${shed == null}">
            <p>Ingen skur</p>
        </div>
        <br>
    </div>

<!--    <a type="submit" class="create-quote-button" th:action="@{/create/order/quote{quote_id}}" >Opret tilbud</a>-->

</div>

<div th:replace="~{fragments :: adminScripts}"></div>
</body>
</html>
