<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments :: adminHead(' admin order details')}"></head>

<body>
<div th:replace="~{fragments :: adminHeader ('admin header')}"></div>

<div class="order-details-overview">

    <div class="order-header">

        <a th:href="@{/admin/my/page}">
            <svg class="admin-return-button" xmlns="http://www.w3.org/2000/svg" width="64" height="64"
                 viewBox="0 0 64 64"
                 fill="none">
                <path class="admin-return-svg" d="M17.3333 10.6667L8 18.6667L17.3333 28" stroke="black"
                      stroke-width="9.25"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <path class="admin-return-svg"
                      d="M8 18.6667H38.6587C47.836 18.6667 55.6293 26.16 55.9867 35.3333C56.3653 45.0267 48.356 53.3333 38.6587 53.3333H15.9973"
                      stroke="black" stroke-width="9.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <h1 class="order-details-title">Admin Ordre oversigt</h1>
    </div>

    <div class="order-details-box">
        <p th:text="${'ID: ' + order_admin_preview.orderId}"></p>
        <p th:text="${'Retailpris: ' + order_admin_preview.retailPrice}"></p>
        <p th:text="${'Indkøbspris: ' + order_admin_preview.costPrice}"></p>
        <br>
        <h2> Kunde</h2>
        <p th:text="${'Navn: ' + customer_order_preview.firstName + ' ' + customer_order_preview.lastName}"></p>
        <p th:text="${'Email: ' + customer_order_preview.email}"></p>
        <p th:text="${'Telefon: ' + customer_order_preview.phoneNumber}"></p>
        <br>
        <p th:text="${'Carport Bredde: ' + carport_order_preview.width + ' cm'}"></p>
        <p th:text="${'Carport Længde: ' + carport_order_preview.length + ' cm'}"></p>
        <p th:text="${'Tagtype: ' + carport_order_preview.roofResponseDTO.roofType}"></p>
        <p th:text="${'Tagmateriale: ' + carport_order_preview.roofResponseDTO.roofMaterial}"></p>
        <p th:text="${'Tag-hældning: ' + carport_order_preview.roofResponseDTO.roofSlope}"></p>
        <div th:if="${order_selected_shed != null}">
            <p th:text="${'Belædning: ' + order_selected_shed.siding}"></p>
            <p th:text="${'Gulv: ' + order_selected_shed.floor}"></p>
            <p th:text="${'Skur Bredde: ' + order_selected_shed.width}"></p>
            <p th:text="${'Skur Længde: ' + order_selected_shed.length}"></p>
        </div>
        <div th:if="${shed == null}">
            <p>Ingen skur</p>
        </div>
        <br>
        <div class="order-details-svg">
            <th:block th:utext="${svg_carport_details}"></th:block>
        </div>
        <br>
    </div>


</div>


<div th:replace="~{fragments :: adminScripts}"></div>

</body>
</html>
