<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments :: adminHead(' admin order details')}"></head>

<body>
<div th:replace="~{fragments :: adminHeader ('admin header')}"></div>


<div class="customer-details-overview">
    <div class="customer-header">

        <a th:href="@{/admin/my/page}">
            <svg class="admin-return-button" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
                 fill="none">
                <path class="admin-return-svg" d="M17.3333 10.6667L8 18.6667L17.3333 28" stroke="black"
                      stroke-width="9.25"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <path class="admin-return-svg"
                      d="M8 18.6667H38.6587C47.836 18.6667 55.6293 26.16 55.9867 35.3333C56.3653 45.0267 48.356 53.3333 38.6587 53.3333H15.9973"
                      stroke="black" stroke-width="9.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <h1 class="customer-details-title">Admin Kunde oversigt</h1>
    </div>

    <div class="order-details-box">
        <p th:text="${'ID: ' + customer_overview.id}"></p>
        <p th:text="${'Navn: ' + customer_overview.firstName + ' ' + customer_overview.lastName}"></p>
        <p th:text="${'Mail: ' + customer_overview.email}"></p>
        <p th:text="${'Tlf.: ' + customer_overview.phoneNumber}"></p>
        <p th:text="${'Addresse: ' + customer_overview.phoneNumber}"></p>
        <p th:text="${'Postnummer: ' + customer_overview.zipCode}"></p>
        <br>
        <p>Forespørgsler</p>
        <th:block th:each="inquiry: ${customer_inquiries_overview}">
            <span th:text="${'ID: ' + inquiry.inquiryId + ' | Kunde: ' + inquiry.customerResponseDTO.firstName + ' ' + inquiry.customerResponseDTO.lastName + ' | Status: ' + (inquiry.quoteSend ? 'Tilbud sendt' : 'Tilbud ikke sendt')}"></span>
        </th:block>

        <p>Tilbud</p>
        <th:block th:each="quote: ${customer_quotes_overview}">
            <span th:text="${'ID: ' + quote.quoteId + ' | Kunde: ' + quote.customerResponseDTO.firstName + ' ' + quote.customerResponseDTO.lastName + ' | Status: ' + (quote.isPayed ? 'Betalt' : 'Ikke betalt')}"></span>
        </th:block>

        <p>Ordrer</p>
        <th:block th:each="order: ${customer_orders_overview}">
            <span th:text="${'ID: ' + order.orderId + ' | Kunde: ' + order.customerResponseDTO.firstName + ' ' + order.customerResponseDTO.lastName + ' | Pris: ' + order.totalPrice}"></span>
        </th:block>
    </div>


<div th:replace="~{fragments :: adminScripts}"></div>
</body>
</html>
