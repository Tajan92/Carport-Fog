<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments :: adminHead(' admin inquiry details')}"></head>

<body>
<div th:replace="~{fragments :: adminHeader ('admin header')}"></div>

<div class="inquiry-details-overview">
    <div class="inquiry-header">

        <a th:href="@{/adminProfilePage}">
            <svg class="admin-return-button" xmlns="http://www.w3.org/2000/svg" width="64" height="64"
                 viewBox="0 0 64 64"
                 fill="none">
                <path class="admin-return-svg" d="M17.3333 10.6667L8 18.6667L17.3333 28" stroke="black"
                      stroke-width="9.25"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <path class="admin-return-svg"
                      d="M8 18.6667H38.6587C47.836 18.6667 55.6293 26.16 55.9867 35.3333C56.3653 45.0267 48.356 53.3333 38.6587 53.3333H15.9973"
                      stroke="black" stroke-width="9.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <h1 class="inquiry-details-title"> Admin Forespørgsels oversigt</h1>
    </div>

    <div class="inquiry-details-box">
        <h2>Forespørgsel</h2>
        <p th:text="${'ID: ' + inquiry_quote_preview.inquiryId}"></p>
        <p th:text="${'Retailpris: ' + inquiry_quote_preview.retailPrice}"></p>
        <p th:text="${'Indkøbspris: ' + inquiry_quote_preview.costPrice}"></p>
        <p th:text="${'Bemærkning: ' + inquiry_quote_preview.remark}"></p>
        <br>
        <h2>Kunde</h2>
        <p th:text="${'Navn: ' + customer_quote_preview.firstName + ' ' + customer_quote_preview.lastName}"></p>
        <p th:text="${'Email: ' + customer_quote_preview.email}"></p>
        <p th:text="${'Telefon: ' + customer_quote_preview.phoneNumber}"></p>
        <br>
        <p th:text="${'Bredde: ' + carport_quote_preview.width + ' cm'}"></p>
        <p th:text="${'Længde: ' + carport_quote_preview.length + ' cm'}"></p>
        <p th:text="${'Tagtype: ' + carport_quote_preview.roofResponseDTO.roofType}"></p>
        <p th:text="${'Tagmateriale: ' + carport_quote_preview.roofResponseDTO.roofMaterial}"></p>
        <p th:text="${'Hvis denne er tom = ingen skur: ' + carport_quote_preview.shedResponseDTO}"></p>
        <br>

        <form th:action="@{/admin/preview/quote}" method="post">
            <input type="hidden" name="inquiry_id" th:value="${inquiry_quote_preview.inquiryId}">
            <input type="hidden" name="customer_id" th:value="${customer_quote_preview.id}">
            <input type="hidden" name="carport_width" th:value="${carport_quote_preview.width}">
            <input type="hidden" name="carport_length" th:value="${carport_quote_preview.length}">
            <input type="hidden" name="roof_type" th:value="${carport_quote_preview.roofResponseDTO.roofType}">
            <input type="hidden" name="roof_material" th:value="${carport_quote_preview.roofResponseDTO.roofMaterial}">
            <input type="hidden" name="roof_slope" th:value="${carport_quote_preview.roofResponseDTO.roofSlope}">
            <button type="submit" class="create-quote-button">Opret tilbud</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments :: adminScripts}"></div>
</body>
</html>
