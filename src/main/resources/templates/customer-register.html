<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments :: head('Customer register')}"></head>
<link rel="stylesheet" href="/public/css/customer-register.css" th:href="@{/css/customer-register.css}"/>
<link rel="stylesheet" href="/public/css/general-styles.css" th:href="@{/css/general-styles.css}"/>

<body>
<a th:href="@{/}">
    <svg class="admin-return-button" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
         fill="none">
        <path class="admin-return-svg" d="M17.3333 10.6667L8 18.6667L17.3333 28" stroke="black"
              stroke-width="9.25"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path class="admin-return-svg"
              d="M8 18.6667H38.6587C47.836 18.6667 55.6293 26.16 55.9867 35.3333C56.3653 45.0267 48.356 53.3333 38.6587 53.3333H15.9973"
              stroke="black" stroke-width="9.25" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</a>

<h1 class="logo">Fog</h1>

<div class="box-register">
    <h1 class="welcome-message">Opret Bruger</h1>

    <form id="register-form" th:action="@{/customer/register}" method="post">

        <div class="field-group">
            <p class="input-description">EMAIL</p>
            <input class="input-box" type="text" name="email" placeholder="eg. user@example.com">
        </div>

        <div class="field-group">
            <p class="input-description">FORNAVN</p>
            <input class="input-box" type="text" name="first_name" placeholder="eg. Jens">
        </div>

        <div class="field-group">
            <p class="input-description">EFTERNAVN</p>
            <input class="input-box" type="text" name="last_name" placeholder="eg.Jensen">
        </div>

        <div class="field-group">
            <p class="input-description">KODEORD</p>
            <input class="input-box" type="password" name="password" placeholder="eg.1234...">
        </div>

        <div class="field-group">
            <p class="input-description">GENTAST KODEORD</p>
            <input class="input-box" type="password" name="confirm_password" placeholder="eg.1234...">
        </div>

        <div class="field-group">
            <p class="input-description">TELEFON</p>
            <input class="input-box" type="tel" name="phone_number" placeholder="eg. 12345678">
        </div>

        <div class="field-group">
            <p class="input-description">ADRESSE</p>
            <input class="input-box" type="text" name="address" placeholder="eg. Hovedgaden 12">
        </div>

        <div class="field-group">
            <p class="input-description">POSTNUMMER</p>
            <input class="input-box" type="text" name="zipcode" placeholder="eg. 1550">
        </div>


        <button class="register-button" type="submit">Opret konto</button>

    </form>

    <div class="register">
        <p>Allerede oprettet?</p>
        <a th:href="@{/customer/login}" type="button" id="register-button">Log ind her</a>
    </div>

</div>

</body>
</html>
